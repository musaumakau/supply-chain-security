apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: supply-chain-demo
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/musaumakau/supply-chain-security.git
    targetRevision: main
    path: k8s/helm/supply-chain-demo
    helm:
      releaseName: supply-chain-demo

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true