apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8srequiresignedimages
  annotations:
    description: >-
      Calls Ratify's external data provider at admission time to verify
      that container images carry a valid Cosign signature matching the
      trust policy defined in the Ratify Verifier CRD (certificate
      identity + OIDC issuer scoped to the approved GitHub Actions
      signing workflow). Ratify performs the actual registry lookup and
      signature/Rekor verification; this policy only enforces the result.
spec:
  crd:
    spec:
      names:
        kind: K8sRequireSignedImages
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
       package k8srequiresignedimages

        remote_data := response {
          containers := object.get(input.review.object.spec, "containers", [])
          init_containers := object.get(input.review.object.spec, "initContainers", [])
          ephemeral_containers := object.get(input.review.object.spec, "ephemeralContainers", [])
          all_containers := array.concat(array.concat(containers, init_containers), ephemeral_containers)
          images := [c.image | c = all_containers[_]]
          response := external_data({"provider": "ratify-provider", "keys": images})
        }

        violation[{"msg": msg}] {
          err := remote_data.system_error
          err != ""
          msg := sprintf("system error calling Ratify external data provider: %v", [err])
        }

        violation[{"msg": msg}] {
          count(remote_data.errors) > 0
          msg := sprintf("one or more images could not be resolved: %v", [remote_data.errors])
        }

        violation[{"msg": msg}] {
          entry := remote_data.responses[_]
          image := entry[0]
          result := entry[1]
          result.isSuccess == false
          msg := sprintf("image '%v' failed Cosign signature verification", [image])
        }