apiVersion: config.ratify.deislabs.io/v1beta1
kind: Store
metadata:
  name: store-oras
spec:
  name: oras
  parameters:
    cosignEnabled: true
    authProvider:
      name: k8Secrets
      serviceAccountName: ratify-admin
      secrets:
        - secretName: ratify-gar-regcred
          namespace: gatekeeper-system