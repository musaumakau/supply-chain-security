apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sRequireSignedImages
metadata:
  name: require-signed-images
  annotations:
    description: >-
      Enforces that all pods in non-system namespaces use container
      images verified by Ratify against the cosign trust policy
      (certificate identity + issuer bound to the approved GitHub
      Actions signing workflow in supply-chain-security).
spec:
  # Rollout stages: dryrun (observe only) -> warn (visible, non-blocking)
  # -> deny (blocking). Currently: dryrun.
  enforcementAction: dryrun
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
    excludedNamespaces:
      - kube-system
      - kube-public
      - kube-node-lease
      - gatekeeper-system
      - argocd
      - crossplane-system
      - cert-manager
      - kyverno
      - kubernetes-dashboard