name: PR Check

on:
  pull_request:
    branches:
      - main
    paths:
      - 'app/**'
      - 'Dockerfile'
      - '.dockerignore'
      - '.github/workflows/**'
      - '.github/actions/**'
      - 'policy/**'
      - 'terraform/**'
      - 'CODEOWNERS'
      - '.github/CODEOWNERS'

permissions:
  contents: read
  security-events: write

jobs:
  security-scan:
    name: Security Scan
    uses: ./.github/workflows/security-scan.yml
    with:
      fail-on-findings: true

  policy-test:
    name: Policy Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Install test dependencies
        run: python3 -m pip install jmespath pyyaml

      - name: Check certificate identity consistency across all policy/CI files
        run: bash policy/tests/check-identity-consistency.sh

      - name: Verify Kyverno Rule 3 conditions against a real provenance predicate
        run: python3 policy/tests/test_jmespath_conditions.py


