name: PR Check

on:
  pull_request:
    branches:
      - main
    paths:
      - 'app/**'
      - 'Dockerfile'
      - '.dockerignore'
      - '.github/workflows/**'
      - '.github/actions/**'

permissions:
  contents: read
  security-events: write

jobs:
  security-scan:
    name: Security Scan
    uses: ./.github/workflows/security-scan.yml
    with:
      fail-on-findings: true