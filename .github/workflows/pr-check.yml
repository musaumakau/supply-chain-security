name: PR Check

on:
  pull_request:
    branches:
      - main
    # No paths filter here on purpose. A path-filtered trigger means the
    # whole workflow never runs at all for a commit outside those paths --
    # GitHub then leaves the required checks stuck "Pending" forever for
    # that commit, permanently blocking merge (confirmed firsthand: this is
    # exactly what happened when Helm chart changes landed in a path this
    # filter didn't cover). Skipping is instead handled per-job below via
    # `if:`, since a job skipped by a conditional correctly reports
    # "skipped" -- which GitHub treats as a passing required check -- while
    # a workflow that never triggers reports nothing at all.

permissions:
  contents: read
  security-events: write
  pull-requests: read  # required by dorny/paths-filter to read the PR diff

jobs:
  changes:
    name: Detect relevant changes
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        with:
          filters: |
            relevant:
              - 'app/**'
              - 'Dockerfile'
              - '.dockerignore'
              - '.github/workflows/**'
              - '.github/actions/**'
              - 'policy/**'
              - 'terraform/**'
              - 'k8s/helm/**'
              - 'CODEOWNERS'
              - '.github/CODEOWNERS'

  security-scan:
    name: Security Scan
    needs: changes
    uses: ./.github/workflows/security-scan.yml
    with:
      fail-on-findings: true
      run-scan: ${{ needs.changes.outputs.relevant == 'true' }}

  policy-test:
    name: Policy Unit Tests
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Install test dependencies
        run: python3 -m pip install jmespath pyyaml

      - name: Check certificate identity consistency across all policy/CI files
        run: bash policy/tests/check-identity-consistency.sh

      - name: Verify Kyverno Rule 3 conditions against a real provenance predicate
        run: python3 policy/tests/test_jmespath_conditions.py
