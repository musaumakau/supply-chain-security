name: SBOM and VEX

on:
  workflow_call:

permissions:
  contents: read

jobs:
  cdxgen:
    name: CycloneDX SBOM + Reachability (depscan)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # -------------------------------------------------------
      # Generate CycloneDX SBOM + atom reachability slices
      # Write output to /tmp inside container to avoid permission
      # issues (container runs as non-root, can't write to /app)
      # then copy back to workspace for depscan and artifact upload
      # -------------------------------------------------------
      - name: Generate CycloneDX SBOM and atom slices
        run: |
          chmod 777 "${{ github.workspace }}"
          docker run --rm \
            -v "${{ github.workspace }}:/app" \
            -w /app \
            ghcr.io/cyclonedx/cdxgen:latest \
            -t python --deep --evidence \
            -o /tmp/bom.cdx.json \
            /app
          docker run --rm \
            -v "${{ github.workspace }}:/app" \
            ghcr.io/cyclonedx/cdxgen:latest \
            sh -c "cp /tmp/bom.cdx.json /app/bom.cdx.json 2>/dev/null || true"
          echo "SBOM generated -- component count:"
          cat bom.cdx.json 2>/dev/null | python3 -c \
            "import json,sys; d=json.load(sys.stdin); print(len(d.get('components', [])))" \
            || echo "SBOM not found or empty"

      # -------------------------------------------------------
      # Run depscan with the SBOM + atom slices for reachability
      # -------------------------------------------------------
      - name: Run depscan reachability analysis
        continue-on-error: true
        timeout-minutes: 10
        run: |
          mkdir -p reports && chmod 777 reports
          docker run --rm \
            -v "${{ github.workspace }}:/app" \
            -v "${{ github.workspace }}/reports:/reports" \
            -w /app \
            ghcr.io/owasp-dep-scan/dep-scan:latest \
            depscan \
              --profile research \
              -t python \
              --bom /app/bom.cdx.json \
              --src /app \
              --reports-dir /reports \
              --no-vuln-table || true

      # -------------------------------------------------------
      # Upload SBOM and depscan reports as artifacts
      # -------------------------------------------------------
      - name: Upload SBOM and reachability report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom-and-vex-${{ github.sha }}
          path: |
            bom.cdx.json
            reports/
          retention-days: 30