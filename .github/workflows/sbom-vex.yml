name: SBOM and VEX

on:
  workflow_call:

permissions:
  contents: read

jobs:
  cdxgen:
    name: CycloneDX SBOM + Reachability (depscan)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # -------------------------------------------------------
      # Generate CycloneDX SBOM + atom reachability slices
      # Point at app/ subdirectory where requirements.txt and
      # main.py actually live -- scanning repo root produces an
      # empty SBOM since cdxgen finds no Python manifests there.
      # -------------------------------------------------------
      - name: Generate CycloneDX SBOM and atom slices
        run: |
          chmod o+w "${{ github.workspace }}"
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            -w /repo \
            ghcr.io/cyclonedx/cdxgen:latest \
            -t python --deep --evidence \
            -o /repo/bom.cdx.json \
            /repo/app
          echo "SBOM generated -- component count:"
          cat bom.cdx.json | python3 -c \
            "import json,sys; d=json.load(sys.stdin); print(len(d.get('components', [])))"

      # -------------------------------------------------------
      # Run depscan with the SBOM + atom slices for reachability
      # --profile research enables reachability analysis via atom
      # -------------------------------------------------------
      - name: Run depscan reachability analysis
        continue-on-error: true
        timeout-minutes: 10
        run: |
          mkdir -p reports && chmod 777 reports
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            -v "${{ github.workspace }}/reports:/reports" \
            -w /repo \
            ghcr.io/owasp-dep-scan/dep-scan:latest \
            depscan \
              --profile research \
              -t python \
              --bom /repo/bom.cdx.json \
              --src /repo/app \
              --reports-dir /reports \
              --no-vuln-table || true

      # -------------------------------------------------------
      # Upload SBOM and depscan reports as artifacts
      # -------------------------------------------------------
      - name: Upload SBOM and reachability report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-and-vex-${{ github.sha }}
          path: |
            bom.cdx.json
            reports/
          retention-days: 30