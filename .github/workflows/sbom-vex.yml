name: SBOM and VEX

on:
  workflow_call:

permissions:
  contents: read

jobs:
  cdxgen:
    name: CycloneDX SBOM + Reachability (depscan)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # -------------------------------------------------------
      # Generate CycloneDX SBOM + atom reachability slices
      # Uses the official cdxgen Docker image which bundles atom
      # and Java so reachability slice generation works correctly
      # for Python projects.
      # -------------------------------------------------------
      - name: Generate CycloneDX SBOM and atom slices
        run: |
          mkdir -p reports && chmod 777 reports
          docker run --rm \
            -v "${{ github.workspace }}:/app" \
            -w /app \
            -e CDXGEN_DEBUG_MODE=debug \
            ghcr.io/cyclonedx/cdxgen:latest \
            cdxgen -t python --deep --evidence \
              -o /app/bom.cdx.json \
              /app
          echo "SBOM generated -- component count:"
          cat bom.cdx.json | python3 -c \
            "import json,sys; d=json.load(sys.stdin); print(len(d.get('components', [])))"
          echo "Atom slices generated:"
          find . -name "*.json" -path "*/slices/*" 2>/dev/null | head -20 || echo "No slice files found"

      # -------------------------------------------------------
      # Run depscan with the SBOM + atom slices for reachability
      # --profile research enables reachability analysis
      # depscan auto-discovers atom slices in the src directory
      # -------------------------------------------------------
      - name: Run depscan reachability analysis
        continue-on-error: true   # never block the pipeline
        timeout-minutes: 10
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/app" \
            -v "${{ github.workspace }}/reports:/reports" \
            -w /app \
            ghcr.io/owasp-dep-scan/dep-scan:latest \
            depscan \
              --profile research \
              -t python \
              --bom /app/bom.cdx.json \
              --src /app \
              --reports-dir /reports \
              --no-vuln-table || true

      # -------------------------------------------------------
      # Upload SBOM and depscan reports as artifacts
      # -------------------------------------------------------
      - name: Upload SBOM and reachability report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom-and-vex-${{ github.sha }}
          path: |
            bom.cdx.json
            reports/
          retention-days: 30