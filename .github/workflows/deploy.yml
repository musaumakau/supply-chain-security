name: Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'Dockerfile'
      - '.dockerignore'
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm a manual build/sign/attest run'
        required: true
        type: string

# Prevent overlapping deploy runs from racing to sign/attest against
# the same or adjacent commits. Queue rather than cancel, since killing
# a signing operation mid-flight could leave a partially-attested image.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write
  security-events: write

jobs:
  build-push:
    name: Build and Push
    # On a real push this always runs. On workflow_dispatch (e.g. re-signing
    # after a Sigstore outage), it only runs if the confirm input matches --
    # a one-click "Run workflow" button with no guard would let anyone with
    # write access silently trigger a full rebuild-and-resign.
    if: github.event_name == 'push' || github.event.inputs.confirm == 'deploy'
    uses: ./.github/workflows/build-push.yml
    with:
      image-tag: ${{ github.sha }}
      push: true
    secrets:
      dockerhub-username: ${{ secrets.DOCKERHUB_USERNAME }}
      dockerhub-token: ${{ secrets.DOCKERHUB_TOKEN }}

  sbom-vex:
    name: SBOM and VEX (non-blocking)
    if: github.event_name == 'push' || github.event.inputs.confirm == 'deploy'
    uses: ./.github/workflows/sbom-vex.yml

  sign-attest:
    name: Sign and Attest
    needs: build-push
    uses: ./.github/workflows/sign-attest.yml
    with:
      digest: ${{ needs.build-push.outputs.digest }}
    secrets:
      dockerhub-username: ${{ secrets.DOCKERHUB_USERNAME }}
      dockerhub-token: ${{ secrets.DOCKERHUB_TOKEN }}

  verify:
    name: Verify
    needs: [build-push, sign-attest]
    uses: ./.github/workflows/verify.yml
    with:
      digest: ${{ needs.build-push.outputs.digest }}