name: Sign and Attest
on:
  workflow_call:
    inputs:
      digest:
        required: true
        type: string

env:
  GAR_LOCATION: europe-west1
  GAR_PROJECT_ID: stoked-citizen-455416-g4
  GAR_REPOSITORY: supply-chain-security
  IMAGE_NAME: supply-chain-demo

permissions:
  contents: read
  id-token: write

jobs:
  sign-attest:
    name: Sign, SBOM, Provenance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Authenticate to GCP
        uses: ./.github/actions/gcp-auth
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SA_EMAIL }}
          registry: ${{ env.GAR_LOCATION }}-docker.pkg.dev

      - name: Setup Cosign
        uses: ./.github/actions/setup-cosign

      - name: Setup Syft
        uses: ./.github/actions/setup-syft

      # Sign the image (keyless via Sigstore OIDC)
      - name: Sign image (keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
          IMAGE_DIGEST: "${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GAR_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}@${{ inputs.digest }}"
        run: |
          echo "Signing: ${IMAGE_DIGEST}"
          cosign sign --yes "${IMAGE_DIGEST}"

      # Generate SBOM and attach as attestation
      - name: Generate SBOM
        env:
          IMAGE_DIGEST: "${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GAR_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}@${{ inputs.digest }}"
        run: |
          echo "Generating SBOM for: ${IMAGE_DIGEST}"
          syft "${IMAGE_DIGEST}" -o spdx-json > sbom.spdx.json
          echo "SBOM generated -- packages found:"
          cat sbom.spdx.json | jq '.packages | length'

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: sbom-${{ github.sha }}
          path: sbom.spdx.json
          retention-days: 90

      - name: Attest SBOM
        env:
          COSIGN_EXPERIMENTAL: "1"
          IMAGE_DIGEST: "${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GAR_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}@${{ inputs.digest }}"
        run: |
          echo "Attaching SBOM attestation to: ${IMAGE_DIGEST}"
          cosign attest --yes \
            --predicate sbom.spdx.json \
            --type spdxjson \
            "${IMAGE_DIGEST}"

      # Generate and attach SLSA provenance attestation
      - name: Generate and attest provenance
        env:
          COSIGN_EXPERIMENTAL: "1"
          IMAGE_DIGEST: "${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GAR_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}@${{ inputs.digest }}"
          REPO: "${{ github.repository }}"
          COMMIT_SHA: "${{ github.sha }}"
          EVENT_NAME: "${{ github.event_name }}"
          GIT_REF: "${{ github.ref }}"
          WORKFLOW: "${{ github.workflow }}"
        run: |
          # Derive the real entryPoint from the OIDC token's job_workflow_ref claim.
          # github.workflow_ref only resolves to the top-level calling workflow
          # (deploy.yml), and there is no github.job_workflow_ref context property --
          # job_workflow_ref only exists inside the OIDC JWT itself.
          OIDC_TOKEN=$(curl -sS -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sigstore" | jq -r '.value')
          PAYLOAD=$(echo "$OIDC_TOKEN" | cut -d '.' -f2)
          PAYLOAD_PADDED="${PAYLOAD//_/\/}"
          PAYLOAD_PADDED="${PAYLOAD_PADDED//-/+}"
          MOD=$(( ${#PAYLOAD_PADDED} % 4 ))
          if [ $MOD -eq 2 ]; then PAYLOAD_PADDED="${PAYLOAD_PADDED}=="; fi
          if [ $MOD -eq 3 ]; then PAYLOAD_PADDED="${PAYLOAD_PADDED}="; fi

          JOB_WORKFLOW_REF=$(echo "$PAYLOAD_PADDED" | base64 -d | jq -r '.job_workflow_ref')
          ENTRY_POINT="${JOB_WORKFLOW_REF#${REPO}/}"
          ENTRY_POINT="${ENTRY_POINT%@*}"
          echo "Resolved entryPoint: ${ENTRY_POINT}"

          cat > provenance.json << PROVENANCE
          {
            "buildType": "https://github.com/Attestations/GitHubActionsWorkflow@v1",
            "builder": {
              "id": "https://github.com/actions/runner"
            },
            "invocation": {
              "configSource": {
                "uri": "git+https://github.com/${REPO}@refs/heads/main",
                "digest": {
                  "sha1": "${COMMIT_SHA}"
                },
                "entryPoint": "${ENTRY_POINT}"
              },
              "parameters": {
                "event": "${EVENT_NAME}",
                "ref": "${GIT_REF}",
                "workflow": "${WORKFLOW}"
              }
            },
            "materials": [
              {
                "uri": "git+https://github.com/${REPO}",
                "digest": {
                  "sha1": "${COMMIT_SHA}"
                }
              }
            ]
          }
          PROVENANCE
          echo "Attaching provenance attestation to: ${IMAGE_DIGEST}"
          cosign attest --yes \
            --predicate provenance.json \
            --type slsaprovenance \
            "${IMAGE_DIGEST}"
