name: Sign and Attest
on:
  workflow_call:
    inputs:
      digest:
        required: true
        type: string
    secrets:
      dockerhub-username:
        required: true
      dockerhub-token:
        required: true

env:
  DOCKERHUB_USERNAME: 5936
  DOCKERHUB_REPOSITORY: supply-chain-demo

permissions:
  contents: read
  id-token: write

jobs:
  sign-attest:
    name: Sign, SBOM, Provenance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Login to Docker Hub
        uses: ./.github/actions/docker-login
        with:
          username: ${{ secrets.dockerhub-username }}
          password: ${{ secrets.dockerhub-token }}

      - name: Setup Cosign
        uses: ./.github/actions/setup-cosign

      - name: Setup Syft
        uses: ./.github/actions/setup-syft

      # -------------------------------------------------------
      # Sign the image (keyless via Sigstore OIDC)
      # -------------------------------------------------------
      - name: Sign image (keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
          IMAGE_DIGEST: "${{ env.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_REPOSITORY }}@${{ inputs.digest }}"
        run: |
          echo "Signing: ${IMAGE_DIGEST}"
          cosign sign --yes "${IMAGE_DIGEST}"

      # -------------------------------------------------------
      # Generate SBOM and attach as attestation
      # -------------------------------------------------------
      - name: Generate SBOM
        env:
          IMAGE_DIGEST: "${{ env.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_REPOSITORY }}@${{ inputs.digest }}"
        run: |
          echo "Generating SBOM for: ${IMAGE_DIGEST}"
          syft "${IMAGE_DIGEST}" -o spdx-json > sbom.spdx.json
          echo "SBOM generated -- packages found:"
          cat sbom.spdx.json | jq '.packages | length'

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom-${{ github.sha }}
          path: sbom.spdx.json
          retention-days: 90

      - name: Attest SBOM
        env:
          COSIGN_EXPERIMENTAL: "1"
          IMAGE_DIGEST: "${{ env.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_REPOSITORY }}@${{ inputs.digest }}"
        run: |
          echo "Attaching SBOM attestation to: ${IMAGE_DIGEST}"
          cosign attest --yes \
            --predicate sbom.spdx.json \
            --type spdxjson \
            "${IMAGE_DIGEST}"

      # -------------------------------------------------------
      # Generate and attach SLSA provenance attestation
      # -------------------------------------------------------
      - name: Generate and attest provenance
        env:
          COSIGN_EXPERIMENTAL: "1"
          IMAGE_DIGEST: "${{ env.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_REPOSITORY }}@${{ inputs.digest }}"
          REPO: "${{ github.repository }}"
          COMMIT_SHA: "${{ github.sha }}"
          EVENT_NAME: "${{ github.event_name }}"
          GIT_REF: "${{ github.ref }}"
          WORKFLOW: "${{ github.workflow }}"
        run: |
          cat > provenance.json << PROVENANCE
          {
            "buildType": "https://github.com/Attestations/GitHubActionsWorkflow@v1",
            "builder": {
              "id": "https://github.com/actions/runner"
            },
            "invocation": {
              "configSource": {
                "uri": "git+https://github.com/${REPO}@refs/heads/main",
                "digest": {
                  "sha1": "${COMMIT_SHA}"
                },
                "entryPoint": ".github/workflows/sign-attest.yml"
              },
              "parameters": {
                "event": "${EVENT_NAME}",
                "ref": "${GIT_REF}",
                "workflow": "${WORKFLOW}"
              }
            },
            "materials": [
              {
                "uri": "git+https://github.com/${REPO}",
                "digest": {
                  "sha1": "${COMMIT_SHA}"
                }
              }
            ]
          }
          PROVENANCE
          echo "Attaching provenance attestation to: ${IMAGE_DIGEST}"
          cosign attest --yes \
            --predicate provenance.json \
            --type slsaprovenance \
            "${IMAGE_DIGEST}"