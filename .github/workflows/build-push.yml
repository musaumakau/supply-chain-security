name: Build and Push

on:
  workflow_call:
    inputs:
      image-tag:
        required: true
        type: string
      push:
        required: true
        type: boolean
    secrets:
      dockerhub-username:
        required: true
      dockerhub-token:
        required: true
    outputs:
      digest:
        description: Digest of the built image
        value: ${{ jobs.build.outputs.digest }}

env:
  DOCKERHUB_USERNAME: 5936
  DOCKERHUB_REPOSITORY: supply-chain-demo

permissions:
  contents: read

jobs:
  build:
    name: Build and Push Image
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Login to Docker Hub
        uses: ./.github/actions/docker-login
        with:
          username: ${{ secrets.dockerhub-username }}
          password: ${{ secrets.dockerhub-token }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: Dockerfile
          push: ${{ inputs.push }}
          build-args: |
            GIT_SHA=${{ github.sha }}
            IMAGE_DIGEST=pending
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_REPOSITORY }}:${{ inputs.image-tag }}
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_REPOSITORY }}:latest
          outputs: type=image,push-by-digest=false,name-canonical=true
