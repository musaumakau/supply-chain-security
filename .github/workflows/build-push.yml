name: Build and Push

on:
  workflow_call:
    inputs:
      image-tag:
        required: true
        type: string
      push:
        required: true
        type: boolean
    secrets:
      dockerhub-username:
        required: true
      dockerhub-token:
        required: true
    outputs:
      digest:
        description: Digest of the built image
        value: ${{ jobs.build.outputs.digest }}

env:
  DOCKERHUB_USERNAME: 5936
  DOCKERHUB_REPOSITORY: supply-chain-demo

permissions:
  contents: read
  security-events: write

jobs:
  build:
    name: Build and Push Image
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Login to Docker Hub
        uses: ./.github/actions/docker-login
        with:
          username: ${{ secrets.dockerhub-username }}
          password: ${{ secrets.dockerhub-token }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: Dockerfile
          push: ${{ inputs.push }}
          build-args: |
            GIT_SHA=${{ github.sha }}
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_REPOSITORY }}:${{ inputs.image-tag }}
          outputs: type=image,push-by-digest=false,name-canonical=true

      - name: Scan image with Trivy
        if: inputs.push
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: "${{ env.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_REPOSITORY }}@${{ steps.build.outputs.digest }}"
          severity: CRITICAL
          exit-code: 1
          format: sarif
          output: trivy-image.sarif
          trivyignores: .trivyignore
          limit-severities-for-sarif: true

      - name: Upload image scan SARIF
        if: inputs.push && always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image
