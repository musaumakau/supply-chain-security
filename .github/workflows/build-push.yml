name: Build and Push
on:
  workflow_call:
    inputs:
      image-tag:
        required: true
        type: string
      push:
        required: true
        type: boolean
    outputs:
      digest:
        description: Digest of the built image
        value: ${{ jobs.build.outputs.digest }}
env:
  GAR_LOCATION: europe-west1
  GAR_PROJECT_ID: stoked-citizen-455416-g4
  GAR_REPOSITORY: supply-chain-security
  IMAGE_NAME: supply-chain-demo
permissions:
  contents: read
  security-events: write
  id-token: write
jobs:
  build:
    name: Build and Push Image
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Authenticate to GCP
        uses: ./.github/actions/gcp-auth
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SA_EMAIL }}
          registry: ${{ env.GAR_LOCATION }}-docker.pkg.dev

      - name: Build and push image
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: Dockerfile
          push: ${{ inputs.push }}
          build-args: |
            GIT_SHA=${{ github.sha }}
          tags: |
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GAR_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ inputs.image-tag }}
          outputs: type=image,push-by-digest=false,name-canonical=true

      - name: Scan image with Trivy
        if: inputs.push
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: "${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GAR_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}"
          severity: CRITICAL,HIGH
          exit-code: 1
          format: sarif
          output: trivy-image.sarif
          trivyignores: .trivyignore
          limit-severities-for-sarif: true

      - name: Upload image scan SARIF
        if: inputs.push && always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image
