name: Security Scan

on:
  workflow_call:
    inputs:
      fail-on-findings:
        description: Whether Semgrep/Trivy findings should fail the job
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  security-events: write

jobs:
  semgrep:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Run Semgrep
        id: semgrep
        continue-on-error: true
        run: |
          semgrep scan \
            --config auto \
            --sarif \
            --output semgrep.sarif \
            .

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Enforce findings policy
        if: inputs.fail-on-findings && steps.semgrep.outcome == 'failure'
        run: |
          echo "Semgrep found blocking issues. Failing the pipeline."
          exit 1

  trivy:
    name: Vulnerability Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH
          exit-code: ${{ inputs.fail-on-findings && '1' || '0' }}

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          sarif_file: trivy.sarif
          category: trivy-fs