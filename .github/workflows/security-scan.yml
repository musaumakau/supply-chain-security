name: Security Scan

on:
  workflow_call:
    inputs:
      fail-on-findings:
        description: Whether Semgrep/Trivy findings should fail the job
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  security-events: write   # required to upload SARIF to the Security tab

jobs:
  semgrep:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Run Semgrep
        id: semgrep
        uses: semgrep/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d # v1
        continue-on-error: true
        with:
          config: p/default
          generateSarif: "1"

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
            sarif_file: semgrep.sarif
            category: semgrep

      - name: Enforce findings policy
        if: inputs.fail-on-findings && steps.semgrep.outcome == 'failure'
        run: |
          echo "Semgrep found blocking issues. Failing the pipeline."
          exit 1

  trivy:
    name: Vulnerability Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@6e7b7d1fd3e4fef0c5fa8cce1229c54b2c9bd0d8 # v0.24.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH
          exit-code: ${{ inputs.fail-on-findings && '1' || '0' }}

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          sarif_file: trivy.sarif
          category: trivy-fs
