name: Security Scan

on:
  workflow_call:
    inputs:
      fail-on-findings:
        description: Whether Semgrep/Trivy findings should fail the job
        required: false
        type: boolean
        default: true
      run-scan:
        description: >-
          Whether to actually run the scan jobs. False when the calling
          workflow determined no relevant paths changed -- jobs still get a
          real "skipped" status this way, which satisfies a required check,
          rather than never running at all (see pr-check.yml for why that
          distinction matters).
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  security-events: write

jobs:
  semgrep:
    name: SAST (Semgrep)
    if: inputs.run-scan
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep@sha256:06938c1f365d3f67b8cedd8bc117607ae64253f88a0e768e9da9408548927dd6
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run Semgrep
        id: semgrep
        continue-on-error: true
        run: |
          semgrep scan \
            --config auto \
            --error \
            --sarif \
            --output semgrep.sarif \
            .

      - name: Print findings to log
        if: always()
        run: |
          apk add --no-cache jq
          jq -r '
            .runs[].results[] |
            "▶ \(.ruleId)\n  \(.locations[0].physicalLocation.artifactLocation.uri):\(.locations[0].physicalLocation.region.startLine)\n  \(.message.text)\n"
          ' semgrep.sarif

      - name: Print findings to summary
        if: always()
        run: |
          echo "## Semgrep Findings" >> "$GITHUB_STEP_SUMMARY"
          jq -r '
            .runs[].results[] |
            "- **\(.ruleId)** -- `\(.locations[0].physicalLocation.artifactLocation.uri):\(.locations[0].physicalLocation.region.startLine)`\n  \(.message.text)"
          ' semgrep.sarif >> "$GITHUB_STEP_SUMMARY"

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Enforce findings policy
        if: inputs.fail-on-findings && steps.semgrep.outcome == 'failure'
        run: |
          echo "Semgrep found blocking issues. Failing the pipeline."
          exit 1

  trivy:
    name: Vulnerability Scan (Trivy)
    if: inputs.run-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH
          exit-code: ${{ inputs.fail-on-findings && '1' || '0' }}

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy.sarif
          category: trivy-fs