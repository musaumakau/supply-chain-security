name: 'GCP Auth'
description: 'Authenticate to GCP via Workload Identity Federation and configure Docker for Artifact Registry'

inputs:
  workload_identity_provider:
    description: 'Full resource name of the Workload Identity Provider'
    required: true
  service_account:
    description: 'Email of the service account to impersonate'
    required: true
  registry:
    description: 'Artifact Registry host to configure Docker for, e.g. europe-west1-docker.pkg.dev'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Authenticate to GCP
      uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
      with:
        workload_identity_provider: ${{ inputs.workload_identity_provider }}
        service_account: ${{ inputs.service_account }}

    - name: Configure Docker for Artifact Registry
      shell: bash
      env:
        REGISTRY: ${{ inputs.registry }}
      run: gcloud auth configure-docker "$REGISTRY" --quiet