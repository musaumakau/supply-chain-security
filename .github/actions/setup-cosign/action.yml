name: Setup Cosign
description: Install Cosign for image signing, attestation, and verification

inputs:
  version:
    description: Cosign version to install
    required: false
    default: "v2.4.1"

runs:
  using: composite
  steps:
    - name: Install Cosign
      uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3
      with:
        cosign-release: ${{ inputs.version }}
