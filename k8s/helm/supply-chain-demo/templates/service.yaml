apiVersion: v1
kind: Service

metadata:
  name: {{ include "supply-chain-demo.fullname" . }}
  labels:
    app: {{ include "supply-chain-demo.name" . }}

spec:
  type: {{ .Values.service.type }}

  selector:
    app: {{ include "supply-chain-demo.name" . }}

  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}